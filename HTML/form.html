<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Student Registration</h1>
    <form action="request.php" method="get" >  
        <label for="name">Name</label>
        <input type="text" name="stu_name" id="name">        
        <br><br>
        <label for="email">Email</label>
        <input type="email" name="stu_email" id="email">
        <br><br>
        <label for="phone">Phone</label>
        <input type="phone" name="stu_phone" id="phone">
        <br><br>
        <label for="password">Password</label>
        <input type="password" name="stu_password" id="password">
        <br><br>
        <label for="dob">Date of Birth</label>
        <input type="date" name="stu_dob" id="dob">
        <br><br>
        <label for="passport">Passort</label>
        <input type="file" accept=".pdf" name="stu_passort" id="passort">
        <br><br>
        <label for="year">Yeras</label>
        <select name="stu_year" id="year">
            <option value="">Choose Your Year</option>
            <option value="1">First Year</option>
            <option value="2">Second Year</option>
            <option value="3">Third year</option>
        </select>
        <br><br>
        <label for="">Gender</label>
        <br><br>
        <input type="radio" name="gender" id="male" value="male">
        <label for="male">Male</label>
         <input type="radio" name="gender" id="female" value="female">
        <label for="female">female</label>
         <input type="radio" name="gender" id="other" value="other">
        <label for="other">Other</label>
        <br><br>
        <label for="">Hobby</label>
        <input type="checkbox" name="gamming" id="gamming" value="gamming">
        <label for="gamming">Gamming</label>
        <input type="checkbox" name="reading" id="reading" value="reading">
        <label for="reading">Reading</label>
        <input type="checkbox" name="walking" id="walking" value="walking">
        <label for="walking">Walking</label>
        <br><br>
        <table for="address">Address</table>
        <textarea name="stu_address" id="address" cols="50" rows="15"></textarea>
        <br><br>
        <input type="time" name="" id="">
        <input type="range" min="0" max="100" name="" id="">
        <input type="color" name="" id="">
        <input type="text" name="" id="" required>
        <input type="text" name="city1" id="" value="Mandalay">
        <input type="text" name="city2" id="" value="Yangon" readonly>
        <input type="text" name="plac" id="" placeholder="eg.09274652">
         <br><br>
        <button type="submit">Submit</button>
        <br><br><br>
    </form>
</body>
</html>
